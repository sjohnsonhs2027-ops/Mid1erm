<!DOCTYPE html>
<html lang="en">
<head>

    <title>Phantom Inspired Template</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">MyPortfolio</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Projects</a>

    <section class="banner">

    <section class="grid">

        <div class="card">
            <img src="https://picsum.photos/400/300?3" alt="">
            <h3>Project Three</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/300?4" alt="">
            <h3>Project Four</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/300?5" alt="">
            <h3>Project Five</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/300?6" alt="">
            <h3>Project Six</h3>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyPortfolio. All rights reserved.</p>
    </footer>

</html>
